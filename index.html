<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERFACE :: A Nation Without Website</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="assets/flag.svg">
</head>
<body>
    <div class="atlas-container">
        
        <!-- Cartographic Plate -->
        <div class="plate-wrapper">
            <object data="assets/map-plate.svg" type="image/svg+xml" class="atlas-map" id="atlas-map"></object>
        </div>

        <!-- Status Bar -->
        <div class="cartographic-status" id="cartographic-status">
            <span id="status-text">🗺️ Awaiting cartographic selection...</span>
            <span id="coordinates">0° 0' 0" N, 0° 0' 0" W</span>
        </div>

        <!-- Portal Overlay -->
        <div class="portal-overlay" id="portal-overlay">
            <div class="portal-window">
                <button class="portal-close" id="portal-close">×</button>
                <div class="portal-header">
                    <h2 id="portal-title">Territory Name</h2>
                    <p id="portal-description">Description of this sovereign territory.</p>
                </div>
                <div class="portal-links" id="portal-links">
                    <!-- Links will be populated dynamically -->
                </div>
                <div class="portal-footer">
                    Form I-404 :: Application for Non-Existent Space
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
