<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
    <!-- Field: Glitched Tricolor -->
    <defs>
        <filter id="glitch">
            <feTurbulence type="fractalNoise" baseFrequency="0.01 0.05" numOctaves="1" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </defs>
    
    <!-- Left Third: Void -->
    <rect x="0" y="0" width="100" height="200" fill="#0B0C10" />
    
    <!-- Middle Third: Data -->
    <rect x="100" y="0" width="100" height="200" fill="#45A29E" filter="url(#glitch)" />
    
    <!-- Right Third: Flesh -->
    <rect x="200" y="0" width="100" height="200" fill="#F3EED9" />
    
    <!-- Charge: Semicolon upon Open Circle -->
    <g transform="translate(150, 100)">
        <!-- Open Circle (missing bottom-right arc) -->
        <path d="M 0,-40 A 40,40 0 0,1 40,0" fill="none" stroke="#0B0C10" stroke-width="4" />
        <path d="M 40,0 A 40,40 0 0,1 -40,0" fill="none" stroke="#0B0C10" stroke-width="4" />
        <path d="M -40,0 A 40,40 0 0,1 0,-40" fill="none" stroke="#0B0C10" stroke-width="4" />
        
        <!-- Semicolon -->
        <circle cx="0" cy="-12" r="4" fill="#F3EED9" />
        <path d="M 0,-4 Q 2,8 6,12" fill="none" stroke="#F3EED9" stroke-width="3" stroke-linecap="round" />
    </g>
</svg>
